<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Expense Dashboard</title>
  <link rel="stylesheet" href="src/styles.css">

  <!--
    Chart.js is loaded from CDN (same version the original dashboard used).
    PDF.js is loaded on demand by src/core/pdf-loader.js, so users who
    never visit the import view pay nothing for it.
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"
    integrity="sha512-ElRFoEQdI5Ht6kZvyzXhYG9NqjtkmlkfYk0wr6wHxU9JEHakS7UJZNeml5ALk+8IKlU6jDgMabC3vkumRokgJA=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
  <div class="dashboard">
    <header class="header">
      <button id="themeToggle" class="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
      <h1>Personal Expenses Dashboard</h1>
      <p>Track and analyze your spending patterns — everything stays on your machine.</p>
    </header>

    <!--
      Persistent top nav. Active state is driven by body[data-route="..."]
      which the router sets on every navigate, so this stays in sync without
      JS handlers here. Each link is a hash anchor so the back button works
      naturally.
    -->
    <nav class="topnav" aria-label="Primary">
      <a href="#/"        class="topnav__link" data-route="landing">Home</a>
      <a href="#/import"  class="topnav__link" data-route="import">Import</a>
      <a href="#/stats"   class="topnav__link" data-route="stats">Stats</a>
      <a href="#/manage"  class="topnav__link" data-route="manage">Manage</a>
    </nav>

    <!-- Mounted views render here. -->
    <main id="view"></main>
  </div>

  <!--
    Script order matters:
      1. core/*       — util, storage, router, pdf-loader. Every other file
                        reaches for App.util / App.storage, so this goes first.
      2. templates/*  — registry comes before the individual bank parsers;
                        each parser calls App.templates.register on load.
      3. processing/* — rules, dedupe, normalization. Depends on storage
                        but not on views.
      4. features/*   — view modules register onto App.views. Depend on
                        everything above.
      5. app.js       — boot. Reads App.storage + App.views + App.router and
                        wires the router. Must run last.
  -->
  <script src="src/core/util.js"></script>
  <script src="src/core/storage.js"></script>
  <script src="src/core/router.js"></script>
  <script src="src/core/pdf-loader.js"></script>

  <script src="src/templates/registry.js"></script>
  <script src="src/templates/leumi.js"></script>
  <script src="src/templates/n26.js"></script>
  <script src="src/templates/santander.js"></script>
  <script src="src/templates/ing.js"></script>
  <script src="src/templates/activo.js"></script>

  <script src="src/processing/translate.js"></script>
  <script src="src/processing/categorize.js"></script>
  <script src="src/processing/duplicate.js"></script>
  <script src="src/processing/transfer.js"></script>
  <script src="src/processing/normalize.js"></script>
  <script src="src/processing/dates.js"></script>
  <script src="src/processing/csv.js"></script>

  <script src="src/features/landing/landing.js"></script>
  <script src="src/features/import/import.js"></script>
  <script src="src/features/manage/manage.js"></script>
  <script src="src/features/stats/stats.js"></script>

  <script src="src/app.js"></script>
</body>
</html>
